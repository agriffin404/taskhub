<style>
  :root { --vio1:#8b5cf6; --vio2:#ec4899; --sky1:#0ea5e9; --sky2:#14b8a6; }
  * { box-sizing: border-box; }
  body { margin:0; background:#ebeef2; font-family: "Segoe UI Variable Text", "Segoe UI", Inter, system-ui, -apple-system, Roboto, sans-serif; color:#1e293b; font-size:16px; line-height:1.45; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; text-rendering:optimizeLegibility; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 24px 22px 72px; }
  .card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; box-shadow:0 1px 2px rgba(0,0,0,.04); }
  /* two-column desktop layout: main content + sticky Today rail. Rail hidden below breakpoint. */
  .layout { display:block; }
  .rail { display:none; }
  .rail .ev:last-child { margin-bottom:0; }
  .hdr { border-radius:16px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .hdr-inner { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:12px; padding:16px 20px; color:#fff; }
  .hdr h1 { font-size:22px; margin:0; line-height:1.1; }
  .hdr p { font-size:13px; margin:2px 0 0; opacity:.9; }
  .tabs { display:flex; gap:4px; background:rgba(255,255,255,.2); padding:4px; border-radius:12px; }
  .tab { display:flex; align-items:center; gap:6px; border:none; background:transparent; color:rgba(255,255,255,.9); font-weight:600; font-size:16px; padding:6px 12px; border-radius:8px; cursor:pointer; }
  .tab.active { background:#fff; }
  .badge { display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; padding:0 5px; border-radius:9999px; background:#ef4444; color:#fff; font-size:12px; font-weight:700; }
  .row { display:flex; align-items:center; gap:10px; }
  .toolbar { display:flex; justify-content:flex-end; flex-wrap:wrap; gap:8px; margin-top:12px; position:relative; }
  .tb-more { display:contents; }                  /* desktop: overflow buttons flow inline */
  .toolbar .tb-more-btn { display:none; }         /* desktop: hide the "More" toggle (beats .btn) */
  /* quick one-line note on collapsed tasks */
  .qnote { width:100%; margin-top:5px; border:1px solid transparent; background:transparent; border-radius:7px; padding:3px 7px; font-family:inherit; font-size:13px; color:#475569; }
  .qnote::placeholder { color:#b6bdc6; }
  .qnote:hover { border-color:#e2e8f0; }
  .qnote:focus { border-color:#94a3b8; background:#fff; outline:none; color:#1e293b; }
  .qnote-prev { display:flex; align-items:center; gap:5px; width:100%; margin-top:5px; border:1px solid transparent; background:transparent; border-radius:7px; padding:3px 7px; font-size:13px; color:#64748b; cursor:pointer; text-align:left; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .qnote-prev:hover { border-color:#e2e8f0; background:#f8fafc; }
  .qnote-prev .more { color:#94a3b8; flex:0 0 auto; }
  .btn { display:inline-flex; align-items:center; gap:7px; border:1px solid #e2e8f0; background:#fff; color:#334155; font-weight:600; font-size:13px; padding:8px 13px; border-radius:10px; cursor:pointer; line-height:1; white-space:nowrap; transition:background .15s,border-color .15s,color .15s,transform .05s; box-shadow:0 1px 1px rgba(15,23,42,.03); }
  .btn:hover { background:#f8fafc; border-color:#cbd5e1; color:#0f172a; }
  .btn:active { transform:translateY(1px); }
  .btn:disabled { opacity:.45; cursor:not-allowed; }
  .btn svg { opacity:.65; }
  .btn:hover svg { opacity:.95; }
  .btn-primary { color:#fff; border:none; box-shadow:0 2px 6px rgba(99,102,241,.25); }
  .btn-primary:hover { opacity:.93; }
  .btn-primary svg { opacity:1; }
  .warn { display:flex; gap:8px; align-items:flex-start; margin-top:12px; padding:10px 12px; border:1px solid #fde68a; background:#fffbeb; color:#92400e; border-radius:12px; font-size:14px; }
  .ok { border-color:#a7f3d0; background:#ecfdf5; color:#047857; }
  .addbox { margin-top:16px; padding:12px; }
  input, select, textarea { font-family:inherit; font-size:16px; color:#1e293b; }
  .titleInput { flex:1; min-width:0; border:none; outline:none; background:transparent; font-size:16px; }
  /* task title: editable but wraps long names instead of clipping */
  .taskTitle { white-space:pre-wrap; word-break:break-word; overflow-wrap:anywhere; line-height:1.3; cursor:text; padding:1px 0; }
  .taskTitle:empty:before { content:"Untitled"; color:#b6bdc6; }
  .taskTitle.done { text-decoration:line-through; color:#94a3b8; }
  /* collapse the add-box options until you click into the box */
  .add-extra { display:none; }
  .addbox:focus-within .add-extra { display:block; }
  .chip { display:inline-flex; align-items:center; gap:5px; border:1px solid #e2e8f0; background:#fff; border-radius:9999px; padding:4px 9px; font-size:13px; font-weight:600; color:#64748b; cursor:pointer; }
  .seg { display:flex; gap:2px; background:#f1f5f9; padding:4px; border-radius:12px; }
  .seg button { border:none; background:transparent; padding:6px 12px; border-radius:8px; font-size:16px; font-weight:600; color:#64748b; cursor:pointer; }
  .seg button.active { background:#fff; color:#0f172a; box-shadow:0 1px 2px rgba(0,0,0,.06); }
  .field { border:1px solid #e2e8f0; border-radius:8px; padding:6px 8px; background:#fff; outline:none; }
  .field:focus { border-color:#94a3b8; }
  .sect { margin-top:20px; }
  .sect-h { display:flex; align-items:center; justify-content:space-between; padding:0 4px 8px; }
  .sect-h .left { display:flex; align-items:center; gap:8px; }
  .sect-h h2 { font-size:16px; margin:0; }
  .pill { background:#f1f5f9; color:#64748b; border-radius:9999px; padding:1px 8px; font-size:13px; font-weight:600; }
  .task { display:flex; flex-wrap:wrap; align-items:flex-start; gap:10px; padding:10px 12px; border:1px solid #eef0f4; border-left-width:3px; border-radius:12px; background:#fff; margin-bottom:8px; }
  .task:hover { box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .cb { width:20px; height:20px; border-radius:9999px; border:1px solid #cbd5e1; background:transparent; cursor:pointer; flex:0 0 auto; display:flex; align-items:center; justify-content:center; margin-top:1px; }
  .cb.done { background:#10b981; border-color:#10b981; color:#fff; }
  .meta { display:flex; flex-wrap:wrap; gap:6px 12px; margin-top:3px; font-size:13px; }
  .icon { width:14px; }
  .iconbtn { display:inline-flex; align-items:center; justify-content:center; border:none; background:transparent; color:#94a3b8; cursor:pointer; width:32px; height:32px; padding:0; border-radius:8px; transition:background .15s,color .15s; }
  .iconbtn:hover { background:#f1f5f9; color:#334155; }
  .muted { color:#64748b; }
  .empty { border:1px dashed #cbd5e1; border-radius:12px; padding:16px; text-align:center; color:#64748b; font-size:13px; }
  .details { margin-top:10px; padding:12px; border:1px solid #e2e8f0; border-radius:12px; background:#f8fafc; display:grid; gap:10px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .modal-bg { position:fixed; inset:0; background:rgba(15,23,42,.45); display:flex; align-items:center; justify-content:center; padding:16px; z-index:50; }
  .modal { background:#fff; border-radius:16px; max-width:560px; width:100%; max-height:92vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,.25); }
  .modal-h { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #eef0f4; flex:0 0 auto; }
  .modal-b { padding:16px; display:grid; gap:12px; overflow-y:auto; }
  textarea.json { width:100%; height:200px; resize:vertical; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; border:1px solid #e2e8f0; border-radius:12px; padding:8px; }
  .ev { display:flex; gap:10px; align-items:center; padding:8px 10px; border:1px solid #eef0f4; border-radius:12px; background:#f8fafc; margin-bottom:6px; }
  .ev .time { min-width:64px; text-align:center; border:1px solid #eef0f4; background:#fff; border-radius:8px; padding:3px 6px; }
  .toast { position:fixed; left:0; right:0; bottom:16px; display:flex; justify-content:center; z-index:60; }
  .toast .inner { background:#0f172a; color:#fff; border-radius:12px; padding:10px 16px; font-size:16px; display:flex; gap:12px; align-items:center; box-shadow:0 8px 24px rgba(0,0,0,.3); }
  a.calllink { display:flex; gap:8px; align-items:center; padding:8px 12px; font-size:15px; color:#334155; text-decoration:none; }
  a.calllink:hover { background:#f8fafc; }
  .menu { position:absolute; right:0; margin-top:4px; width:230px; background:#fff; border:1px solid #e2e8f0; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.15); overflow:hidden; z-index:30; }
  .menu button { width:100%; text-align:left; border:none; background:#fff; padding:8px 12px; font-size:15px; color:#334155; cursor:pointer; display:flex; gap:8px; align-items:center; }
  .menu button:hover { background:#f8fafc; }
  .menu button:disabled { color:#cbd5e1; cursor:not-allowed; }
  .selcb { width:22px; height:22px; border-radius:6px; border:1px solid #cbd5e1; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#fff; flex:0 0 auto; margin-top:1px; font-weight:700; }
  .selcb.on { background:#3b82f6; border-color:#3b82f6; }
  .bulkbar { margin-top:12px; padding:10px 14px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; border-color:#bfdbfe; background:#eff6ff; }
  .lbl { font-size:13px; color:#64748b; }
  .note-preview { font-size:13px; color:#475569; background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:8px 10px; word-break:break-word; line-height:1.5; }
  .note-preview a, .qnote-prev a { color:#6366f1; text-decoration:underline; word-break:break-all; }
  .evday { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#64748b; margin:6px 0 8px; padding-top:12px; border-top:2px solid #e2e8f0; }
  .evday:first-of-type { margin-top:2px; }
  .btn-danger { color:#dc2626; border-color:#fecaca; }
  .btn-danger:hover { background:#fef2f2; border-color:#fca5a5; color:#b91c1c; }

  /* ---- compact density (toolbar toggle): tighter rows so more tasks fit on screen ---- */
  .compact .task { padding:6px 10px; margin-bottom:5px; }
  .compact .sect { margin-top:12px; }
  .compact .sect-h { padding-bottom:5px; }
  .compact .meta { font-size:12px; gap:4px 10px; margin-top:1px; }
  .compact .qnote, .compact .qnote-prev { margin-top:2px; padding:2px 6px; font-size:12px; }
  .compact .cb { width:18px; height:18px; }
  .compact .ev { padding:5px 8px; margin-bottom:4px; }
  .compact .empty { padding:10px; }

  /* ---- focus visibility (keyboard) ---- */
  :focus { outline:none; }
  :focus-visible { outline:2px solid #6366f1; outline-offset:2px; border-radius:6px; }
  .tab:focus-visible { outline:2px solid #fff; outline-offset:1px; }
  .field:focus-visible, .titleInput:focus-visible { outline:2px solid #6366f1; outline-offset:0; border-color:#6366f1; }
  a.calllink:focus-visible, .menu button:focus-visible { outline:2px solid #6366f1; outline-offset:-2px; }

  /* ---- selected task highlight (class so dark mode can override) ---- */
  .task.sel { background:#eff6ff; border-color:#bfdbfe; }

  /* ---- drag-to-reschedule ---- */
  .grip { display:flex; align-items:center; justify-content:center; width:20px; align-self:stretch; min-height:26px; border:none; background:transparent; color:#cbd5e1; cursor:grab; padding:0; margin:-2px 2px -2px -4px; border-radius:8px; flex:0 0 auto; }
  .grip:hover { color:#94a3b8; }
  .grip:active { cursor:grabbing; }
  .task.dragging { opacity:.45; }
  .sect.dropok { background:#eef2ff; outline:2px dashed #6366f1; outline-offset:2px; border-radius:14px; }
  .task.dropbefore { box-shadow:inset 0 3px 0 0 #6366f1; }

  /* ---- inline meta editing ---- */
  .metachip { display:inline-flex; align-items:center; gap:5px; border:1px solid transparent; background:transparent; font:inherit; font-size:13px; font-weight:500; padding:2px 6px; border-radius:8px; cursor:pointer; line-height:1.2; }
  .metachip:hover { background:#f1f5f9; border-color:#e2e8f0; }
  .editpop { position:absolute; left:0; top:100%; margin-top:6px; z-index:40; background:#fff; border:1px solid #e2e8f0; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.16); padding:10px; min-width:220px; display:grid; gap:8px; }
  .calbtn { color:#6366f1; }
  .calbtn:hover { background:#eef2ff; color:#4f46e5; }

  /* ---- responsive ---- */
  @media (max-width:640px){
    .wrap { padding:16px 14px 64px; }
    .hdr-inner { padding:14px 16px; }
    .hdr h1 { font-size:20px; }
    .hdr-inner > div:first-child { flex:1 1 auto; }
    .tabs { width:100%; }
    .tab { flex:1 1 0; justify-content:center; padding:6px 6px; font-size:14px; }
    .toolbar { justify-content:flex-start; }
    .grid2 { grid-template-columns:1fr; }
    .menu { width:min(86vw,230px); }
    .hide-sm { display:none; }
    .meta { gap:4px 10px; }
    .toolbar .tb-more-btn { display:inline-flex; }
    .tb-more { display:none; position:absolute; right:0; top:calc(100% + 6px); z-index:60; flex-direction:column; align-items:stretch; gap:6px; min-width:212px; background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:8px; box-shadow:0 12px 30px rgba(0,0,0,.18); }
    .tb-more.open { display:flex; }
    .tb-more .btn { justify-content:flex-start; width:100%; }
    .tb-more .btn .hide-sm { display:inline; }
  }
  /* ---- wide screens: show the sticky Today rail beside the main column ---- */
  @media (min-width:1180px){
    .wrap { max-width:1560px; }
    .layout { display:grid; grid-template-columns:minmax(0,1fr) 340px; gap:24px; align-items:start; }
    .rail { display:block; position:sticky; top:16px; align-self:start; max-height:calc(100vh - 32px); overflow:auto; }
    .rail-fallback { display:none; } /* Today view's inline calendar — rail covers it on wide screens */
  }

  /* ---- dark mode ---- */
  /* warm graphite palette · elevation: bg #1a1917 < field #1c1b19 < card #242220 < overlay #2b2825 */
  html[data-theme="dark"] { color-scheme:dark; }
  html[data-theme="dark"] body { background:#1a1917; color:#e8e6e3; }
  html[data-theme="dark"] .hdr-inner { filter:brightness(.9) saturate(.95); }
  html[data-theme="dark"] .card { background:#242220; border-color:#38332e; box-shadow:0 1px 3px rgba(0,0,0,.45); }
  html[data-theme="dark"] .task { background:#242220; border-color:#38332e; }
  html[data-theme="dark"] .task:hover { box-shadow:0 2px 8px rgba(0,0,0,.5); }
  html[data-theme="dark"] .task.sel { background:#2e2a1f; border-color:#7c6a3f; }
  html[data-theme="dark"] input, html[data-theme="dark"] select, html[data-theme="dark"] textarea { color:#e8e6e3; }
  html[data-theme="dark"] .titleInput { color:#e8e6e3; }
  html[data-theme="dark"] .field, html[data-theme="dark"] textarea.json { background:#1c1b19; border-color:#443f39; }
  html[data-theme="dark"] .field:focus { border-color:#818cf8; }
  html[data-theme="dark"] .btn { background:#2a2724; border-color:#443f39; color:#d6d3d1; box-shadow:none; }
  html[data-theme="dark"] .btn:hover { background:#353029; border-color:#55504a; color:#fff; }
  html[data-theme="dark"] .btn-primary { color:#fff; }
  html[data-theme="dark"] .chip { background:#2a2724; border-color:#443f39; color:#d6d3d1; }
  html[data-theme="dark"] .seg { background:#1c1b19; }
  html[data-theme="dark"] .seg button { color:#a8a29e; }
  html[data-theme="dark"] .seg button.active { background:#353029; color:#fff; }
  html[data-theme="dark"] .pill { background:#2a2724; color:#d6d3d1; }
  html[data-theme="dark"] .tb-more { background:#242220; border-color:#38332e; box-shadow:0 12px 30px rgba(0,0,0,.5); }
  html[data-theme="dark"] .qnote { color:#cdc8c2; }
  html[data-theme="dark"] .qnote::placeholder { color:#6b6660; }
  html[data-theme="dark"] .qnote:hover { border-color:#38332e; }
  html[data-theme="dark"] .qnote:focus { border-color:#818cf8; background:#1c1b19; color:#e8e6e3; }
  html[data-theme="dark"] .qnote-prev { color:#a8a29e; }
  html[data-theme="dark"] .qnote-prev:hover { border-color:#38332e; background:#2b2825; }
  html[data-theme="dark"] .menu { background:#2b2825; border-color:#443f39; }
  html[data-theme="dark"] .menu button { background:#2b2825; color:#d6d3d1; }
  html[data-theme="dark"] .menu button:hover { background:#353029; }
  html[data-theme="dark"] .menu button:disabled { color:#6b635a; }
  html[data-theme="dark"] .modal { background:#242220; }
  html[data-theme="dark"] .modal-h { border-color:#38332e; }
  html[data-theme="dark"] .details { background:#1c1b19; border-color:#38332e; }
  html[data-theme="dark"] .empty { border-color:#443f39; color:#a8a29e; }
  html[data-theme="dark"] .ev { background:#1c1b19; border-color:#38332e; }
  html[data-theme="dark"] .ev .time { background:#242220; border-color:#38332e; }
  html[data-theme="dark"] a.calllink { color:#d6d3d1; }
  html[data-theme="dark"] a.calllink:hover { background:#353029; }
  html[data-theme="dark"] .cb { border-color:#5a5249; }
  html[data-theme="dark"] .selcb { background:#1c1b19; border-color:#5a5249; }
  html[data-theme="dark"] .selcb.on { background:#3b82f6; border-color:#3b82f6; }
  html[data-theme="dark"] .iconbtn { color:#8a827a; }
  html[data-theme="dark"] .iconbtn:hover { background:#2a2724; color:#d6d3d1; }
  html[data-theme="dark"] .warn { background:#332a12; border-color:#6b5417; color:#fcd34d; }
  html[data-theme="dark"] .warn.ok { background:#142a1e; border-color:#1f5a3f; color:#6ee7b7; }
  html[data-theme="dark"] .bulkbar { background:#2c2820; border-color:#55504a; }
  html[data-theme="dark"] .muted { color:#a8a29e; }
  html[data-theme="dark"] .grip { color:#6b635a; }
  html[data-theme="dark"] .grip:hover { color:#a8a29e; }
  html[data-theme="dark"] .sect.dropok { background:#2e2a1f; outline-color:#a16207; }
  html[data-theme="dark"] .metachip:hover { background:#2a2724; border-color:#443f39; }
  html[data-theme="dark"] .editpop { background:#2b2825; border-color:#443f39; }
  html[data-theme="dark"] .calbtn { color:#a5b4fc; }
  html[data-theme="dark"] .calbtn:hover { background:#2a2724; color:#c7d2fe; }
  html[data-theme="dark"] .lbl { color:#a8a29e; }
  html[data-theme="dark"] .note-preview { background:#1c1b19; border-color:#38332e; color:#cdc8c2; }
  html[data-theme="dark"] .note-preview a, html[data-theme="dark"] .qnote-prev a { color:#a5b4fc; }
  html[data-theme="dark"] .evday { color:#a8a29e; border-top-color:#38332e; }
  html[data-theme="dark"] .btn-danger { color:#f87171; border-color:#7f1d2e; }
  html[data-theme="dark"] .btn-danger:hover { background:#3a1d24; border-color:#9f2535; color:#fca5a5; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
"use strict";
// ---------------- constants ----------------
var STORAGE_KEY = "taskhub-html-v1";
var SCHEMA_VERSION = 2;
var EVENT_DESC_DEFAULT = "Created in TaskHub";
// NOTE: events are loaded live from the linked taskhub-events.json. The baked snapshot is
// intentionally empty so this file is safe to host publicly (no calendar data inside it).
var EVENTS_SYNCED_AT = "";
var EVENTS_RANGE_LABEL = "";

// wrap the selection (or a placeholder) in a marker, e.g. ** for bold
function fmtWrap(ta, mark, placeholder, after){

// ---- link / reconnect everything at once (data + events + AI inbox) ----
function parseJSONsafe(s){ try{ return JSON.parse(s); }catch(e){ return null; } }
async function linkDataHandle(){
  // establish read/write, then reconcile direction so neither side's tasks are lost
  if(!(await ensurePerm(fileHandle,"readwrite"))){ dataNeedsPermission=true; return; }
  dataNeedsPermission=false;
  var txt=""; try{ var fd=await fileHandle.getFile(); txt=await fd.text(); }catch(e){}
  var parsed=parseJSONsafe(txt);
  var fileTasks=(parsed&&Array.isArray(parsed.tasks))?parsed.tasks.filter(function(t){return t&&!t.deletedAt;}).length:0;
  var appTasks=store.tasks.filter(function(t){return !t.deletedAt;}).length;
  if(fileTasks>0 && appTasks>0){
    var useFile=confirm("Link data file\n\nThis device has "+appTasks+" task"+(appTasks===1?"":"s")+"; the file has "+fileTasks+".\n\nOK = use the FILE (replace this device's tasks)\nCancel = keep THIS DEVICE (overwrite the file)");
    if(useFile){ doImport(txt, true); } else { await writeToFile(); }
  } else if(fileTasks>0){ doImport(txt, true); }   // file has data, device empty -> load it
  else { await writeToFile(); }                     // device has data (or both empty) -> write it
}
async function linkAll(){
  if(!fsSupported) return;
  try{
    var hs=await window.showOpenFilePicker({ multiple:true, types:[{description:"JSON",accept:{"application/json":[".json"]}}] });
    var got=[];
    for(var i=0;i<hs.length;i++){
      var h=hs[i]; var nm=(h.name||"").toLowerCase();
      if(nm.indexOf("event")>=0){ eventsHandle=h; eventsNeedsReconnect=false; await idbHandle("put","events",h); got.push("events"); }
      else if(nm.indexOf("inbox")>=0){ inboxHandle=h; inboxNeedsReconnect=false; await idbHandle("put","inbox",h); got.push("AI inbox"); }
      else { fileHandle=h; dataNeedsPermission=false; await idbHandle("put","data",h); got.push("data"); }
    }
    if(got.indexOf("data")>=0){ await linkDataHandle(); }
    if(eventsHandle && got.indexOf("events")>=0) await readEvents(true);
    if(inboxHandle && got.indexOf("AI inbox")>=0) await readInbox(true);
    toast(got.length?("Linked "+got.join(" + ")):"No files selected - pick your taskhub-*.json files");
  }catch(e){ /* cancelled */ }
  render();
}
function rcNeeded(){ return fsSupported && ((fileHandle&&dataNeedsPermission)||(eventsHandle&&eventsNeedsReconnect)||(inboxHandle&&inboxNeedsReconnect)); }
async function reconnectAll(){
  var done=[];
  // data first (it needs the readwrite grant). Each requestPermission needs a fresh user gesture,
  // and on file:// the browser usually allows only one prompt per click — so we report what's left.
  if(fileHandle && dataNeedsPermission){ if(await ensurePerm(fileHandle,"readwrite")){ dataNeedsPermission=false; await writeToFile(); done.push("auto-save"); } }
  if(eventsHandle && eventsNeedsReconnect){ await readEvents(true); if(!eventsNeedsReconnect) done.push("events"); }
  if(inboxHandle && inboxNeedsReconnect){ await readInbox(true); if(!inboxNeedsReconnect) done.push("AI inbox"); }
  if(done.length && rcNeeded()) toast("Reconnected "+done.join(" + ")+" — tap Reconnect all again to finish the rest");
  else if(done.length) toast("Reconnected "+done.join(" + "));
  else toast("Nothing needed reconnecting");
  render();
}

function idbHandle(method, key, val){
  return new Promise(function(res){
    try{
      var open=indexedDB.open("taskhub-fs",1);
      open.onupgradeneeded=function(){ try{ open.result.createObjectStore("h"); }catch(e){} };
      open.onerror=function(){ res(null); };
      open.onsuccess=function(){ try{ var db=open.result; var tx=db.transaction("h", method==="get"?"readonly":"readwrite"); var st=tx.objectStore("h"); var rq=method==="get"?st.get(key):st.put(val,key); rq.onsuccess=function(){ res(rq.result); }; rq.onerror=function(){ res(null); }; }catch(e){ res(null); } };
    }catch(e){ res(null); }
  });
}
async function ensurePerm(h, mode){ try{ var o={mode:mode||"read"}; if((await h.queryPermission(o))==="granted") return true; if((await h.requestPermission(o))==="granted") return true; }catch(e){} return false; }

function hasTZ(s){ return /[Zz]$|[+\-]\d\d:?\d\d$/.test(""+s); }   // ISO string carries a UTC offset / Z
function fmtClockFromISO(iso){

  if(hasTZ(s)){ var d=new Date(s); if(!isNaN(d.getTime())) return d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}); }  // offset-aware -> local time
  var m=s.match(/T(\d\d):(\d\d)/); if(!m) return s; var h=+m[1], mm=m[2]; var ap=h<12?"AM":"PM"; var hr=h%12; if(hr===0)hr=12; return hr+":"+mm+" "+ap;
}
function localDateFromISO(s){ if(hasTZ(s)){ var d=new Date(s); if(!isNaN(d.getTime())) return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); } return (""+s).slice(0,10); }

function datePart(x){ return (isISO(x)||(typeof x==="string"&&/^\d{4}-\d{2}-\d{2}/.test(x))) ? (""+x).slice(0,10) : null; }
function normEvents(e){   // returns an array (all-day events that span multiple days produce one entry per day)
  if(!e || (typeof e.title!=="string" && typeof e.subject!=="string")) return [];
  var title=String(e.title||e.subject);
  var teams=!!(e.teams||e.isOnlineMeeting);
  var showAs=(typeof e.showAs==="string" && SHOWAS[e.showAs]) ? e.showAs : "busy";
  // Teams join link if the flow supplies one (joinUrl / onlineMeetingUrl); http(s) only
  var joinRaw=(typeof e.joinUrl==="string"&&e.joinUrl)||(typeof e.onlineMeetingUrl==="string"&&e.onlineMeetingUrl)||null;
  var join=(joinRaw && /^https?:\/\//i.test(joinRaw)) ? joinRaw : null;
  if(e.allDay || e.isAllDay){
    // floating dates: use the literal date portion (NO timezone conversion); end is exclusive (Outlook)
    var sd=e.date || datePart(e.start); if(!sd) return [];
    var ed=datePart(e.end);
    var out=[];
    if(ed && ed>sd){ var d=sd, guard=0; while(d<ed && guard<60){ out.push({title:title,date:d,allDay:true,start:null,end:null,teams:teams,showAs:showAs,join:join}); d=addDays(d,1); guard++; } }
    else { out.push({title:title,date:sd,allDay:true,start:null,end:null,teams:teams,showAs:showAs,join:join}); }
    return out;
  }
  // timed event: offset-aware local time/date
  var date=e.date, start=(e.start!=null?e.start:null), end=(e.end!=null?e.end:null);
  if(isISO(start)){ if(!date) date=localDateFromISO(start); start=fmtClockFromISO(start); }
  if(isISO(end)){ end=fmtClockFromISO(end); }
  if(!date) return [];
  return [{ title:title, date:String(date), allDay:false, start:start||null, end:end||null, teams:teams, showAs:showAs, join:join }];
}
function parseEventsPayload(text){
  var parsed=JSON.parse(text);
  var arr = Array.isArray(parsed) ? parsed : (Array.isArray(parsed.events) ? parsed.events : null);
  if(!arr) throw new Error("No events array found.");
  var evs=[]; arr.forEach(function(e){ normEvents(e).forEach(function(n){ evs.push(n); }); });
  var meta = Array.isArray(parsed) ? {} : parsed;
  return { events:evs, syncedAt: meta.syncedAt||null, rangeLabel: meta.rangeLabel||null };
}

// ---------------- AI inbox (an AI agent writes a change-set; we ingest & merge) ----------------
// The agent READS taskhub-data.json (current tasks + ids) and WRITES taskhub-inbox.json (ops).
// Safe ops (add/complete/uncomplete) auto-apply; risky ops (update/reschedule/delete) queue for review.
var inboxHandle = null;          // FileSystemFileHandle for taskhub-inbox.json (read)
var inboxNeedsReconnect = false;
var inboxPending = [];           // risky ops awaiting your review (each carries _k)
var inboxLastBatch = null;       // {batchId, generatedAt, count} from the last read
var INBOX_LEDGER_KEY = "taskhub-inbox-ledger-v1";

function saveInboxLedger(){ try{ if(inboxDone.length>1000) inboxDone=inboxDone.slice(inboxDone.length-1000); localStorage.setItem(INBOX_LEDGER_KEY, JSON.stringify(inboxDone)); }catch(e){} }
function hashStr(s){ var h=0; for(var i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return ""+h; }
function inboxKey(op, batchId, idx){ if(op && typeof op.opId==="string" && op.opId) return "id:"+op.opId; if(batchId) return "b:"+batchId+"#"+idx; return "h:"+hashStr(JSON.stringify(op)); }
var SAFE_INBOX_ACTIONS = { add:1, complete:1, uncomplete:1 };
function isSafeInboxOp(op){ return !!SAFE_INBOX_ACTIONS[op.action]; }
function inboxPendingHas(k){ for(var i=0;i<inboxPending.length;i++){ if(inboxPending[i]._k===k) return true; } return false; }

function inboxFindTarget(m){
  if(!m || typeof m!=="object") return null;
  if(m.id){ var byId=store.tasks.filter(function(t){return t.id===m.id;})[0]; if(byId) return byId; }
  if(m.title){ var tl=(""+m.title).trim().toLowerCase(); var list=(m.list!=null)?(""+m.list).toLowerCase():null;
    var cands=store.tasks.filter(function(t){ return !t.deletedAt && (""+t.title).trim().toLowerCase()===tl && (!list||t.list===list); });
    if(cands.length===1) return cands[0]; }
  return null;
}
function inboxCoerce(s){   // -> validated patch containing only recognized task fields
  var p={}; if(!s || typeof s!=="object") return p;
  if(typeof s.title==="string" && s.title.trim()) p.title=s.title.trim();
  if(s.list!=null){ var l=(""+s.list).toLowerCase(); if(l==="work"||l==="personal") p.list=l; }
  if(s.priority!=null){ var pr=(""+s.priority).toLowerCase(); if(pr==="high"||pr==="medium"||pr==="low") p.priority=pr; }
  if(typeof s.notes==="string") p.notes=s.notes;
  if("dueDate" in s){ if(s.dueDate===null||s.dueDate===false||s.dueDate==="") p.dueDate=null; else if(/^\d{4}-\d{2}-\d{2}$/.test(""+s.dueDate)) p.dueDate=""+s.dueDate; }
  if(typeof s.dueTime==="string" && /^\d{1,2}:\d{2}$/.test(s.dueTime)) p.dueTime=s.dueTime;
  if(s.remind===false) p.dueTime=null;
  if(s.remind===true && !("dueTime" in p)) p.dueTime="09:00";
  return p;
}
function inboxApply(op){    // mutates store; returns {ok, desc, permanent} — permanent:true = never retry this op
  var a=op.action;
  if(a==="add"){
    var p=inboxCoerce(op.task||{});
    if(!p.title) return {ok:false, permanent:true, desc:"Add skipped (no title)"};
    // optional caller-supplied id (used by integrations like the To Do inbound flow so the
    // next outbound run matches by [taskhub:id] and never duplicates); guard against collisions
    var givenId = (op.task && typeof op.task.id==="string" && op.task.id) ? op.task.id : (typeof op.id==="string" && op.id ? op.id : null);
    if(givenId && store.tasks.filter(function(t){return t.id===givenId;}).length) return {ok:false, permanent:true, desc:"Add skipped (id exists)"};
    var tag="[ai]"+(op.source?(" "+op.source):""); var notes=(p.notes||"").trim(); notes = notes ? (notes+"\n\n"+tag) : tag;
    var dd=p.dueDate||null;
    store.tasks.push({ id:givenId||uid("t"), title:p.title, list:p.list||"work", sectionId:null, priority:p.priority||"medium", dueDate:dd, dueTime:(dd?(p.dueTime||null):null), notes:notes, completed:false, completedAt:null, recur:"none", deletedAt:null, createdAt:Date.now() });
    return {ok:true, desc:"Added “"+p.title+"”"};
  }
  var t=inboxFindTarget(op.match);
  if(!t) return {ok:false, permanent:false, desc:(a||"op")+" skipped (no matching task yet — will retry)"};
  if(a==="complete"||a==="uncomplete"){ var done=(a==="complete");
    // use the completion time the source supplied (e.g. the exact To Do tap time) if present, else now
    var doneAt = done ? (op.completedAt!=null ? (typeof op.completedAt==="number"?op.completedAt:(new Date(op.completedAt).getTime()||Date.now())) : Date.now()) : null;
    store.tasks=store.tasks.map(function(x){ return x.id===t.id?Object.assign({},x,{completed:done, completedAt: doneAt}):x; }); return {ok:true, desc:(done?"Completed “":"Reopened “")+t.title+"”"}; }
  if(a==="delete"){ store.tasks=store.tasks.map(function(x){ return x.id===t.id?Object.assign({},x,{deletedAt:Date.now(),completed:false}):x; }); return {ok:true, desc:"Deleted “"+t.title+"”"}; }
  if(a==="update"||a==="reschedule"){ var patch=inboxCoerce(op.set||{}); var merged=Object.assign({},t,patch); if(!merged.dueDate) merged.dueTime=null; store.tasks=store.tasks.map(function(x){ return x.id===t.id?merged:x; }); return {ok:true, desc:(a==="reschedule"?"Rescheduled “":"Updated “")+t.title+"”"}; }
  return {ok:false, permanent:true, desc:"Unknown action: "+a};
}
function processInbox(data, silent){
  var batchId = (data && typeof data.batchId==="string") ? data.batchId : null;
  var rawOps = Array.isArray(data) ? data : (data && Array.isArray(data.ops) ? data.ops : null);
  if(!rawOps){ if(!silent) toast("AI inbox has no \"ops\" list"); render(); return; }
  inboxLastBatch = { batchId:batchId, generatedAt:(data&&data.generatedAt)||null, count:rawOps.length };
  var fresh=[];
  rawOps.forEach(function(op, idx){ if(!op || typeof op!=="object" || !op.action) return; var k=inboxKey(op, batchId, idx); if(inboxDone.indexOf(k)>=0) return; if(inboxPendingHas(k)) return; op._k=k; fresh.push(op); });
  if(!fresh.length){ if(!silent) toast("No new AI changes"); render(); return; }
  var safe=fresh.filter(isSafeInboxOp), risky=fresh.filter(function(o){ return !isSafeInboxOp(o); });
  var applied=0, deferred=0;
  if(safe.length){
    pushHistory();
    safe.forEach(function(op){
      var r=inboxApply(op);
      if(r.ok){ applied++; inboxDone.push(op._k); }
      else if(r.permanent){ inboxDone.push(op._k); }          // will never succeed — don't retry
      else { deferred++; }                                    // no match YET (e.g. complete before its add synced) — retry next read
    });
    if(applied){ save(); } else { undoStack.pop(); }          // drop the no-op history snapshot
  }
  risky.forEach(function(op){ inboxPending.push(op); });
  saveInboxLedger(); render();
  if(risky.length && !silent) openModal("aiReview");
  var extra=(risky.length?" · "+risky.length+" to review":"")+(deferred?" · "+deferred+" retrying later":"");
  if(applied){ toast("Applied "+applied+" AI change"+(applied===1?"":"s")+extra, {label:"Undo", fn:doUndo}); }
  else if(risky.length){ toast(risky.length+" AI suggestion"+(risky.length===1?"":"s")+" to review", {label:"Review", fn:function(){ openModal("aiReview"); }}); }
  else if(deferred){ if(!silent) toast(deferred+" AI change"+(deferred===1?"":"s")+" waiting for a matching task — will retry on the next check"); }
  else if(!silent){ toast("No new AI changes"); }
}
async function readInbox(silent){
  if(!inboxHandle) return;
  try{
    if(!(await ensurePerm(inboxHandle,"read"))){ inboxNeedsReconnect=true; render(); return; }
    var f=await inboxHandle.getFile(); var txt=await f.text();
    inboxNeedsReconnect=false;
    if(!txt.trim()){ if(!silent) toast("AI inbox is empty"); render(); return; }
    var data; try{ data=JSON.parse(txt); }catch(e){ if(!silent) toast("AI inbox isn't valid JSON"); render(); return; }
    processInbox(data, silent);
  }catch(e){ if(!silent) toast("Could not read AI inbox"); }
}
async function connectInboxFile(){ try{ var hs=await window.showOpenFilePicker({ types:[{description:"JSON",accept:{"application/json":[".json"]}}] }); inboxHandle=hs[0]; await idbHandle("put","inbox",inboxHandle); await readInbox(false); }catch(e){} }
async function restoreInboxHandle(){ if(!fsSupported) return; var h=await idbHandle("get","inbox"); if(!h || typeof h.getFile!=="function") return; inboxHandle=h; try{ if((await h.queryPermission({mode:"read"}))==="granted"){ await readInbox(true); } else { inboxNeedsReconnect=true; render(); } }catch(e){} }
function inboxResolve(op, apply){
  var idx=-1; for(var i=0;i<inboxPending.length;i++){ if(inboxPending[i]._k===op._k){ idx=i; break; } }
  if(idx<0) return;
  if(apply){ pushHistory(); var r=inboxApply(op); save(); toast(r.desc); }
  inboxDone.push(op._k); saveInboxLedger(); inboxPending.splice(idx,1);
  if(!inboxPending.length && modal==="aiReview") modal=null;
  render();
}
function inboxResolveAll(apply){
  if(!inboxPending.length) return;
  if(apply){ pushHistory(); var n=0; inboxPending.forEach(function(op){ if(inboxApply(op).ok) n++; inboxDone.push(op._k); }); save(); toast("Applied "+n+" change"+(n===1?"":"s")); }
  else { inboxPending.forEach(function(op){ inboxDone.push(op._k); }); toast("Discarded "+inboxPending.length+" suggestion"+(inboxPending.length===1?"":"s")); }
  inboxPending=[]; saveInboxLedger(); modal=null; render();
}
var INBOX_SCHEMA = JSON.stringify({
  type:"object",
  properties:{
    batchId:{type:"string"},
    generatedAt:{type:"string"},

// sortable due key: "YYYY-MM-DDThh:mm" (no time -> end of day so timed items lead), null = no due date
function dueKey(t){ return t.dueDate ? (t.dueDate + "T" + (t.dueTime || "99:99")) : null; }
function titleCmp(a,b){ return (a.title||"").localeCompare((b.title||""), undefined, {sensitivity:"base", numeric:true}); }   // A-Z, number-aware
function manualKey(t){ return (t.order!=null ? t.order : t.createdAt); }   // hand-arranged order (falls back to created)
function sortTasks(arr){
  var dir = (sortDir==="desc") ? -1 : 1;
  return arr.slice().sort(function(a,b){
    if(a.completed!==b.completed) return a.completed?1:-1;            // completed always last (not flipped)
    var pc = PRIO_ORDER[a.priority]-PRIO_ORDER[b.priority];          // High -> Medium -> Low
    var tc = titleCmp(a,b);                                          // final tiebreak: alphabetical
    var r;
    if(sortMode==="manual"){ r = (manualKey(a)-manualKey(b)) || (a.createdAt-b.createdAt); }
    else if(sortMode==="created"){ r = (b.createdAt-a.createdAt) || tc; }   // newest first
    else if(sortMode==="done"){ var ad=a.completedAt||0, bd=b.completedAt||0; r = (bd-ad) || (b.createdAt-a.createdAt); }   // most recently completed first
    else if(sortMode==="alpha"){ r = tc || (a.createdAt-b.createdAt); }     // A -> Z
    else if(sortMode==="priority"){ r = pc || tc; }
    else { // due date: soonest (most overdue) first, no-date last -> priority -> alphabetical
      var ka=dueKey(a), kb=dueKey(b);
      if(ka!==kb){ r = (ka===null)?1:(kb===null)?-1:(ka<kb?-1:1); } else { r = pc || tc; }
    }
    return r * dir;
  });
}

  if(groupBy==="list"){ var ls=(view==="combined")?["personal","work"]:[view]; return { groups:ls.map(function(l){return {k:l,name:(THEME[l]&&THEME[l].label)||l};}), of:function(t){return t.list;}, set:function(id,k){ updateTask(id,{list:k}); }, hint:function(g){return "Drop a task here to move it to "+g.name+".";} }; }

function evDayLabel(ds){ var p=ds.split("-").map(Number); var dt=new Date(p[0],p[1]-1,p[2]); var t0=new Date(); t0.setHours(0,0,0,0); var diff=Math.round((dt-t0)/86400000); if(diff===0)return "Today"; if(diff===1)return "Tomorrow"; return dt.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"}); }

    b.appendChild(el('<div class="muted" style="font-size:12px">Full step-by-step + flow diagram: see the <code>TaskHub-PowerAutomate-CheatSheet.docx</code> and <code>TaskHub-PowerAutomate-Flow-Sketch.docx</code> guides in your TaskHub setup folder.</div>'));
    b.appendChild(el('<div style="border-top:1px solid '+(darkMode?"#38332e":"#e2e8f0")+'; margin-top:8px; padding-top:12px; font-size:13px; font-weight:700">Other direction: pull Outlook events in</div>'));
    b.appendChild(el('<div class="muted" style="font-size:13px">A second flow pulls your Outlook calendar into the <b>Upcoming Events</b> panel (Outlook &rarr; <code>taskhub-events.json</code> &rarr; TaskHub). Step-by-step: <code>TaskHub-PowerAutomate-Events.docx</code> in this folder.</div>'));
    if(fsSupported){
      var evRow=el('<div class="row" style="gap:8px; flex-wrap:wrap"></div>');
      if(eventsHandle && !eventsNeedsReconnect){ evRow.appendChild(el('<span class="muted" style="font-size:13px">'+ic('check')+' Outlook events connected'+(eventsMeta&&eventsMeta.syncedAt?' &middot; synced '+esc(eventsMeta.syncedAt):'')+'</span>')); }
      else { var ecn=el('<button class="btn">'+ic('bolt')+' Connect Outlook events</button>'); ecn.onclick=function(){ closeModal(); connectEventsFile(); }; evRow.appendChild(ecn); }
      b.appendChild(evRow);
    }
  } else if(modal==="trash"){
    var trash=trashedTasks().slice().sort(function(a,b){ return b.deletedAt-a.deletedAt; });
    b.appendChild(el('<div class="muted" style="font-size:13px">Deleted tasks are kept here and auto-removed after 30 days. Restore to bring one back.</div>'));
    if(!trash.length){ b.appendChild(el('<div class="empty">Recently deleted is empty.</div>')); }
    else {
      var topRow=el('<div class="row" style="justify-content:flex-end; gap:8px"></div>');
      var ra=el('<button class="btn">'+ic('undo')+' Restore all</button>'); ra.onclick=function(){ restoreAllTrash(); };
      var et=el('<button class="btn btn-danger">'+ic('trash')+' Empty trash</button>'); et.onclick=function(){ if(confirm("Permanently delete "+trash.length+" task"+(trash.length===1?"":"s")+"? This can't be undone via the file backup.")) emptyTrash(); };
      topRow.appendChild(ra); topRow.appendChild(et); b.appendChild(topRow);
      var listWrap=el('<div style="display:grid; gap:6px"></div>');
      trash.forEach(function(t){
        var row=el('<div class="ev" style="align-items:flex-start"></div>');
        var when=new Date(t.deletedAt).toLocaleDateString(undefined,{month:"short",day:"numeric"});
        row.appendChild(el('<div style="flex:1; min-width:0"><div style="font-weight:500">'+esc(t.title)+'</div><div class="muted" style="font-size:12px">'+((THEME[t.list]&&THEME[t.list].label)||t.list)+' &middot; deleted '+esc(when)+'</div></div>'));
        var rbtn=el('<button class="btn" style="padding:5px 10px">Restore</button>'); rbtn.onclick=function(){ restoreTask(t.id); };
        var pbtn=el('<button class="iconbtn" title="Delete forever" aria-label="Delete forever: '+esc(t.title)+'" style="color:'+odC()+'">'+ic('trash')+'</button>'); pbtn.onclick=function(){ purgeTask(t.id); };
        row.appendChild(rbtn); row.appendChild(pbtn);
        listWrap.appendChild(row);
      });
      b.appendChild(listWrap);
    }
  } else if(modal==="ai"){
    b.appendChild(el('<div class="muted" style="font-size:13px">Let an <b>AI agent</b> add and adjust tasks from your meetings, docs and chats. The agent <b>reads</b> <code>taskhub-data.json</code> (current tasks + ids), then <b>writes</b> a change-set to <code>taskhub-inbox.json</code>. TaskHub ingests it on window focus (or <b>Check now</b>): <b>adds &amp; completes apply automatically</b>; edits, reschedules and deletes wait for your review.</div>'));
    b.appendChild(el('<div class="muted" style="font-size:13px">Self-healing: if the agent completes or edits a task that hasn\'t synced into TaskHub yet, it <b>retries on the next check</b> instead of being skipped &mdash; so "add a task and mark it done" lands on its own once it syncs.</div>'));
    if(!fsSupported){ b.appendChild(el('<div class="warn">'+ic('alert')+' <span>This browser can\'t link local files, so the file inbox isn\'t available. You can still paste a change-set via <b>Import</b>.</span></div>')); }
    else {
      var cRow=el('<div class="row" style="gap:8px; flex-wrap:wrap"></div>');
      if(inboxHandle && !inboxNeedsReconnect){
        cRow.appendChild(el('<span class="muted" style="font-size:13px">'+ic('check')+' AI inbox connected'+(inboxLastBatch&&inboxLastBatch.generatedAt?(' &middot; last batch '+esc(inboxLastBatch.generatedAt)):'')+'</span>'));
        var chk=el('<button class="btn" style="padding:5px 10px">'+ic('repeat')+' Check now</button>'); chk.onclick=function(){ readInbox(false); }; cRow.appendChild(chk);
      } else if(inboxHandle && inboxNeedsReconnect){ var rc2=el('<button class="btn">'+ic('link')+' Reconnect AI inbox</button>'); rc2.onclick=function(){ readInbox(false); }; cRow.appendChild(rc2); }
      else { var cn2=el('<button class="btn">'+ic('bolt')+' Connect AI inbox</button>'); cn2.onclick=function(){ closeModal(); connectInboxFile(); }; cRow.appendChild(cn2); }
      b.appendChild(cRow);
      if(inboxPending.length){ var rv=el('<button class="btn btn-primary" style="background:'+THEME.today.grad+'">'+ic('sparkles')+' Review '+inboxPending.length+' suggestion'+(inboxPending.length===1?"":"s")+'</button>'); rv.onclick=function(){ openModal("aiReview"); }; b.appendChild(rv); }
    }
    b.appendChild(el('<div style="font-size:13px; font-weight:700; margin-top:4px">Set up the AI agent</div>'));
    var ol2=el('<ol style="font-size:14px; line-height:1.6; margin:0; padding-left:20px"></ol>');
    ol2.innerHTML='<li>Give the agent <b>read</b> access to <code>taskhub-data.json</code> and <b>read+write</b> to <code>taskhub-inbox.json</code> (same OneDrive folder).</li>'
      +'<li>Paste the <b>agent instructions</b> + <b>schema</b> (below) into the agent.</li>'
      +'<li>In TaskHub, click <b>Connect AI inbox</b> and pick <code>taskhub-inbox.json</code> (it reconnects automatically afterward).</li>'
      +'<li>Chat with the agent ("turn today\'s meeting notes into tasks"). It writes the inbox; TaskHub picks it up on focus or <b>Check now</b>.</li>';
    b.appendChild(ol2);
    b.appendChild(el('<div style="font-size:13px; font-weight:700; margin-top:4px">Change-set schema</div>'));
    var sc2=el('<textarea class="json" readonly style="height:150px" aria-label="Inbox schema"></textarea>'); sc2.value=INBOX_SCHEMA; b.appendChild(sc2);
    var rowi=el('<div class="row" style="justify-content:flex-end; gap:8px; flex-wrap:wrap"></div>');
    var dls=el('<button class="btn">'+ic('download')+' Download sample inbox</button>'); dls.onclick=function(){ downloadText(inboxSample(), "taskhub-inbox.json"); };
    var cps=el('<button class="btn btn-primary" style="background:'+THEME.combined.grad+'">Copy schema</button>'); cps.onclick=function(){ sc2.focus(); sc2.select(); try{document.execCommand("copy");}catch(e){} if(navigator.clipboard)navigator.clipboard.writeText(sc2.value).then(function(){toast("Schema copied");},function(){}); toast("Schema copied"); };
    rowi.appendChild(dls); rowi.appendChild(cps); b.appendChild(rowi);
    b.appendChild(el('<div class="muted" style="font-size:12px">Full setup + ready-to-paste agent instructions: see the <code>TaskHub-AI-Agent.docx</code> guide in your TaskHub setup folder.</div>'));
  } else if(modal==="aiReview"){
    b.appendChild(el('<div class="muted" style="font-size:13px">These changes affect existing tasks, so they wait for your OK. (Adds &amp; completes were already applied automatically.) Anything you apply here goes through normal undo and Recently&nbsp;deleted.</div>'));
    if(!inboxPending.length){ b.appendChild(el('<div class="empty">No AI suggestions to review.</div>')); }
    else {
      var topR=el('<div class="row" style="justify-content:flex-end; gap:8px"></div>');
      var dall=el('<button class="btn btn-danger">'+ic('x')+' Discard all</button>'); dall.onclick=function(){ inboxResolveAll(false); };
      var aall=el('<button class="btn btn-primary" style="background:'+THEME.today.grad+'">'+ic('check')+' Apply all</button>'); aall.onclick=function(){ inboxResolveAll(true); };
      topR.appendChild(dall); topR.appendChild(aall); b.appendChild(topR);
      var wrapL=el('<div style="display:grid; gap:8px"></div>');
      inboxPending.forEach(function(op){
        var t=inboxFindTarget(op.match);
        var actLabel={update:"Update",reschedule:"Reschedule",delete:"Delete"}[op.action]||op.action;
        var bits=[];
        if(op.action==="delete"){ bits.push("Move to Recently deleted"); }
        else { var p=inboxCoerce(op.set||{}); Object.keys(p).forEach(function(k){ var label={dueDate:"Due date",dueTime:"Time",priority:"Priority",list:"List",title:"Title",notes:"Notes"}[k]||k; var val=(k==="notes")?"…":(p[k]===null?"(none)":p[k]); bits.push(label+" → "+esc(""+val)); }); }
        var c2=el('<div class="ev" style="align-items:flex-start; flex-direction:column; gap:6px"></div>');
        c2.appendChild(el('<div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap"><span class="pill" style="background:'+lS("today")+'; color:'+lA("today")+'">'+esc(actLabel)+'</span> <b style="font-size:15px">'+esc(t?t.title:((op.match&&op.match.title)||"(task not found)"))+'</b></div>'));
        if(bits.length) c2.appendChild(el('<div style="font-size:13px">'+bits.join(' &middot; ')+'</div>'));
        if(op.reason) c2.appendChild(el('<div class="muted" style="font-size:12px">Why: '+esc(op.reason)+'</div>'));
        if(op.source) c2.appendChild(el('<div class="muted" style="font-size:12px">Source: '+esc(op.source)+'</div>'));
        if(!t) c2.appendChild(el('<div style="font-size:12px; color:'+odC()+'">No matching task &mdash; applying will do nothing.</div>'));
        var bR=el('<div class="row" style="gap:8px"></div>');
        var apb=el('<button class="btn" style="padding:5px 10px">'+ic('check')+' Apply</button>'); apb.onclick=(function(o){return function(){ inboxResolve(o,true); };})(op);
        var dsb=el('<button class="btn btn-danger" style="padding:5px 10px">Discard</button>'); dsb.onclick=(function(o){return function(){ inboxResolve(o,false); };})(op);
        bR.appendChild(apb); bR.appendChild(dsb); c2.appendChild(bR);
        wrapL.appendChild(c2);
      });
      b.appendChild(wrapL);
    }
  } else {
    b.appendChild(el('<div class="muted" style="font-size:13px">Paste backup JSON or choose a .json file. This <b>replaces</b> all current data.</div>'));
    var fileInp=el('<input type="file" accept="application/json,.json" aria-label="Choose backup file" />'); fileInp.onchange=function(){ var f=fileInp.files[0]; if(!f)return; var rd=new FileReader(); rd.onload=function(){ if(doImport(rd.result,false)){ closeModal(); } }; rd.readAsText(f); }; b.appendChild(fileInp);
    var ta2=el('<textarea class="json" placeholder=\'{"tasks":[...],"sections":[...]}\'></textarea>'); ta2.value=importBuf; ta2.oninput=function(){ importBuf=ta2.value; }; b.appendChild(ta2);
    var row2=el('<div class="row" style="justify-content:flex-end; gap:8px"></div>');
    var cancel=el('<button class="btn">Cancel</button>'); cancel.onclick=closeModal;
    var imp=el('<button class="btn btn-primary" style="background:'+THEME.combined.grad+'">Import &amp; Replace</button>'); imp.onclick=function(){ if(doImport(ta2.value,false)){ closeModal(); } };
    row2.appendChild(cancel); row2.appendChild(imp); b.appendChild(row2);
  }
  m.appendChild(b); bg.appendChild(m); return bg;
}

// ---------------- modal open/close + focus management ----------------
function openModal(which){ lastFocused=document.activeElement; modal=which; if(which==="import")importBuf=""; render(); }
function closeModal(){ modal=null; render(); if(lastFocused && typeof lastFocused.focus==="function"){ try{ lastFocused.focus(); }catch(e){} } lastFocused=null; }
function trapTab(e){
  var mod=document.querySelector(".modal"); if(!mod)return;
  var f=mod.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),textarea:not([disabled]),select:not([disabled]),[tabindex]:not([tabindex="-1"])');
  if(!f.length)return;
  var first=f[0], last=f[f.length-1];
  if(e.shiftKey){ if(document.activeElement===first || !mod.contains(document.activeElement)){ e.preventDefault(); last.focus(); } }
  else { if(document.activeElement===last){ e.preventDefault(); first.focus(); } }
}

// close calendar menu / inline editors when clicking outside them
document.addEventListener("click", function(e){
  var changed=false;
  if(menuOpen && !e.target.closest(".menu") && !e.target.closest("[data-calbtn]")){ menuOpen=null; changed=true; }
  if(popover && !e.target.closest(".editpop") && !e.target.closest("[data-metachip]")){ popover=null; changed=true; }
  if(changed) render();
  // close the mobile "More" toolbar menu on outside click (no re-render needed)
  var moreOpen=document.querySelector(".tb-more.open");
  if(moreOpen && !e.target.closest(".tb-more") && !e.target.closest(".tb-more-btn")){ moreOpen.classList.remove("open"); var mb=document.querySelector(".tb-more-btn"); if(mb) mb.setAttribute("aria-expanded","false"); }
});

// ---------------- keyboard shortcuts ----------------
document.addEventListener("keydown", function(e){
  if(e.key==="Escape"){
    if(modal){ closeModal(); return; }
    if(popover){ popover=null; render(); return; }
    if(menuOpen!==null){ menuOpen=null; render(); return; }
    if(selectMode){ selectMode=false; selected={}; render(); return; }
  }
  if(modal){ if(e.key==="Tab") trapTab(e); return; }
  var inField = /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName) || e.target.isContentEditable;
  if((e.ctrlKey||e.metaKey) && (e.key==="z"||e.key==="Z") && e.shiftKey){ if(!inField){ e.preventDefault(); doRedo(); } return; }
  if((e.ctrlKey||e.metaKey) && (e.key==="y"||e.key==="Y")){ if(!inField){ e.preventDefault(); doRedo(); } return; }
  if((e.ctrlKey||e.metaKey) && (e.key==="z"||e.key==="Z")){ if(!inField){ e.preventDefault(); doUndo(); } return; }
  if((e.ctrlKey||e.metaKey) && (e.key==="a"||e.key==="A")){ if(selectMode && !inField){ e.preventDefault(); var ids=visibleOrderedIds(); ids.forEach(function(i){ selected[i]=true; }); if(ids.length)selAnchor=ids[ids.length-1]; render(); } return; }
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  if(inField) return;
  if(e.key==="/"){ var s=document.getElementById("searchInput"); if(s){ e.preventDefault(); s.focus(); } return; }
  if(e.key==="n"||e.key==="N"){ var a=document.getElementById("addInput"); if(a){ e.preventDefault(); a.focus(); } return; }
  if(e.key==="?"){ toast("Shortcuts: / search · n new task · 1-4 tabs · Esc close · Ctrl+Z undo · Ctrl+Y redo · in Select: Ctrl+A all, Shift-click range"); return; }
  if(e.key>="1" && e.key<="4"){ var map={"1":"today","2":"combined","3":"work","4":"personal"}; view=map[e.key]; render(); return; }
});

purgeOldTrash();
archiveOldDone();
loadPrefs();
applyTheme();
render();
restoreDataHandle();
restoreEventsHandle();
restoreInboxHandle();
window.addEventListener("focus", function(){
  // don't rebuild the view (and lose uncommitted edits / caret / scroll) while a dialog is open or a field is focused; next idle focus picks it up
  if(modal) return;
  var ae=document.activeElement;
  if(ae && (/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName) || ae.isContentEditable)) return;
  if(eventsHandle && !eventsNeedsReconnect) readEvents(true);
  if(inboxHandle && !inboxNeedsReconnect) readInbox(true);
});
</script>
